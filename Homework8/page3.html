<html>

<head>

    <title>Contact</title>

    <script>

        function getData() {

            var firstName = document.getElementById("fName").value;
            var lastName = document.getElementById("lName").value;


            if (fName.value == "" || lName.value == "") {
                window.alert("Something isn't filled out");
